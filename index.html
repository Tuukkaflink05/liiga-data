<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>
    <script src="https://cdn.jsdelivr.net/npm/danfojs@1.2.0/lib/bundle.min.js"></script>

     <link rel="stylesheet" href="styles.css">

</head>
<body>


    <div class="splash crt-filter">
       <h2>Welcome!</h2>
       <p>Getting Ready</p>
    </div>

    <div id='test'></div>

    <div id="teamselection">
        <form action="">
            <label for="teams">Choose a team:</label>
            <select name="teams" id="teams">
                <option value=0>Choose a team</option>
            </select>
        </form>
    </div>


    <div id="playerselection">
        <form action="">
            <label for="players">Choose a player:</label>
            <select name="players" id="players">
                <option value=0>Choose a player</option>
            </select>
        </form>
    </div>


    <div id="team-info" class="info-box">
        <h3>Team Info</h3>
        <ul id="team-info-list"></ul>
    </div>

    <div id="player-info" class="info-box">
        <h3>Player info</h3>
        <ul id="player-info-list"></ul>
    </div>


    <script type="module" src="script.js"></script>

</body>
</html>
